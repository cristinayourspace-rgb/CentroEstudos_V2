{% extends "base.html" %}

{% block titulo %}
Editar Nota
{% endblock %}

{% block conteudo %}

<div class="card">

    <h2>Editar Nota</h2>

    <br>

    <form method="POST">

        <label>Disciplina</label>

        <input
            type="text"
            name="disciplina"
            value="{{ nota.disciplina }}"
            required
        >

        <label>Nota</label>

        <input
            type="number"
            min="0"
            max="100"
            step="0.01"
            name="nota"
            value="{{ nota.nota }}"
            required
        >

        <label>Data da Avaliação</label>

        <input
            type="date"
            name="data_avaliacao"
            value="{{ nota.data_avaliacao }}"
            required
        >

        <button type="submit">
            Guardar Alterações
        </button>

        <a href="/notas">
            Cancelar
        </a>

    </form>

</div>

{% endblock %}
