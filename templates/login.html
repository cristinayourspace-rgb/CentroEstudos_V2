<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login - Centro Estudos V2</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
            margin:0;
        }

        .login-box{

            width:350px;

            background:white;

            padding:30px;

            border-radius:10px;

            box-shadow:0 0 15px rgba(0,0,0,.1);
        }

        h2{
            text-align:center;
        }

        input{

            width:100%;

            padding:10px;

            margin-top:10px;

            margin-bottom:15px;

            box-sizing:border-box;
        }

        button{

            width:100%;

            padding:10px;

            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="login-box">

    <h2>Centro Estudos V2</h2>

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Entrar
        </button>

    </form>

</div>

</body>
</html>
